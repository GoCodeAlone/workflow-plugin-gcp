version: 2
project_name: workflow-plugin-gcp

before:
  hooks:
    - go mod tidy
    - bash -c "sed -i.bak 's/\"version\": \"[^\"]*\"/\"version\": \"{{ .Version }}\"/' plugin.json && sed -i.bak 's|download/v[0-9][^/]*/|download/v{{ .Version }}/|g' plugin.json && sed -i.bak 's|workflow-plugin-gcp_[0-9][^_]*_|workflow-plugin-gcp_{{ .Version }}_|g' plugin.json && rm -f plugin.json.bak"

builds:
  - id: plugin
    main: .
    binary: workflow-plugin-gcp
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/GoCodeAlone/workflow-plugin-gcp/provider.ProviderVersion={{.Version}}
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
